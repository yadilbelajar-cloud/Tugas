<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor Pemrograman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0e14] text-gray-200 min-h-screen flex flex-col items-center p-6">
    
    <div class="w-full max-w-3xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white tracking-tight">AI CODE <span class="text-blue-500">ASSISTANT</span></h1>
            <p class="text-gray-400 mt-2">Solusi cerdas untuk tugas pemrograman Anda</p>
        </header>

        <div class="bg-[#161b22] border border-gray-800 rounded-xl p-6 shadow-2xl">
            <label class="block mb-2 text-sm font-medium text-gray-400">Deskripsi Tugas</label>
            <textarea id="promptInput" rows="6" 
                class="w-full bg-[#0d1117] border border-gray-700 rounded-lg p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                placeholder="Contoh: Jelaskan cara kerja pengulangan for di Python dan berikan contoh kodenya..."></textarea>
            
            <button onclick="sendToAI()" id="btnSubmit"
                class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-all flex justify-center items-center gap-2">
                <span>Dapatkan Jawaban</span>
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden mt-8 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
            <p class="mt-2 text-sm text-blue-400">AI sedang berpikir...</p>
        </div>

        <!-- Hasil Jawaban -->
        <div id="resultSection" class="hidden mt-8 animate-fadeIn">
            <h2 class="text-xl font-semibold mb-4 text-white">Solusi:</h2>
            <div id="responseOutput" class="bg-[#161b22] border border-gray-800 rounded-xl p-6 font-mono text-sm leading-relaxed whitespace-pre-wrap overflow-x-auto">
            </div>
        </div>
    </div>

    <script>
        async function sendToAI() {
            const prompt = document.getElementById('promptInput').value;
            const output = document.getElementById('responseOutput');
            const resultSection = document.getElementById('resultSection');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('btnSubmit');

            if (!prompt) return alert("Harap isi pertanyaan!");

            // UI State
            loading.classList.remove('hidden');
            resultSection.classList.add('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                // Memanggil serverless function di folder /api
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();
                output.innerText = data.text;
                resultSection.classList.remove('hidden');
            } catch (error) {
                alert("Terjadi kesalahan koneksi.");
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
